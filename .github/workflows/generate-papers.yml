name: Generate Papers

on:
  schedule:
    # Runs daily at 8:17 AM UTC (off-minute to reduce load spikes)
    - cron: '17 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live and Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-extra \
            pandoc

      - name: Generate .tex and .pdf files
        run: bash scripts/generate-papers.sh

      - name: Commit and push new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ICMI-*.tex ICMI-*.pdf
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Auto-generate .tex and .pdf for new papers"
            git push
          fi
